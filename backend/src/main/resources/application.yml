server:
  port: 8080

spring:
  application:
    name: estore-backend

  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:file:./data/estore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true

  h2:
    console:
      enabled: true

app:
  cors:
    allowed-origins: "*"

---
spring:
  config:
    activate:
      on-profile: "!mongo"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: "mongo"
  data:
    mongodb:
      uri: mongodb://localhost:27017/estore
